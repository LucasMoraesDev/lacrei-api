# pytest.ini — configuração explícita para compatibilidade
# (complementa pyproject.toml)
[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    -ra
markers =
    slow: marca testes lentos (roda com -m slow)
    integration: testes de integração que precisam de serviços externos
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
