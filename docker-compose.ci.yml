version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Lacrei Saúde API — Docker Compose para CI (GitHub Actions)
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lacrei_test
      POSTGRES_USER: lacrei_user
      POSTGRES_PASSWORD: lacrei_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lacrei_user -d lacrei_test"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-test-secret-key
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             pytest --cov=apps --cov-report=xml --cov-report=term-missing -v"
