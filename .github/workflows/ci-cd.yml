
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8.2"
  ECR_REPOSITORY: lacrei-saude-api
  AWS_REGION: us-east-1

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Lint & Static Analysis
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache de dependências
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-

      - name: Instalar dependências
        run: poetry install --no-interaction

      - name: Ruff — Linting
        run: poetry run ruff check .

      - name: Black — Formatação
        run: poetry run black --check .

      - name: Mypy — Type checking
        run: poetry run mypy apps/
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — Testes Automatizados
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Testes & Cobertura
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lacrei_test
          POSTGRES_USER: lacrei_user
          POSTGRES_PASSWORD: lacrei_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      SECRET_KEY: ci-test-secret-key-not-for-production
      DB_NAME: lacrei_test
      DB_USER: lacrei_user
      DB_PASSWORD: lacrei_pass
      DB_HOST: localhost
      DB_PORT: "5432"

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache de dependências
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: venv-${{ runner.os }}-

      - name: Instalar dependências
        run: poetry install --no-interaction

      - name: Executar migrações
        run: poetry run python manage.py migrate --settings=config.settings.test

      - name: Rodar testes com cobertura
        run: |
          poetry run pytest \
            --cov=apps \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v \
            --tb=short

      - name: Upload de cobertura para Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: lacrei-coverage
        continue-on-error: true

      - name: Verificar segurança das dependências
        run: |
          pip install safety
          poetry export -f requirements.txt | safety check --stdin
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Build da Imagem Docker (sem push — AWS não configurada ainda)
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem (local — sem push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: lacrei-saude-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4 — Deploy Staging (branch: staging) — requer credenciais AWS
  # ─────────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: 🌿 Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment:
      name: staging
      url: https://api-staging.lacreisaude.com.br

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy no ECS (Staging)
        run: echo "Deploy staging — configurar AWS secrets para ativar"

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 5 — Deploy Produção (branch: main) — requer credenciais AWS
  # ─────────────────────────────────────────────────────────────────────────
  deploy-production:
    name: 🏁 Deploy → Production (Blue/Green)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://api.lacreisaude.com.br

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy Blue/Green via AWS CodeDeploy
        run: echo "Deploy produção — configurar AWS secrets para ativar"

      - name: Rollback automático em caso de falha
        if: failure()
        run: echo "Rollback — configurar AWS secrets para ativar"
