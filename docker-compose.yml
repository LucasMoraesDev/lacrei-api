version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Lacrei Saúde API — Docker Compose (desenvolvimento local)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: lacrei_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-lacrei_db}
      POSTGRES_USER: ${DB_USER:-lacrei_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lacrei_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lacrei_user} -d ${DB_NAME:-lacrei_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Django API ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: lacrei_api
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: dev-secret-change-me
      DEBUG: "True"
      DB_NAME: ${DB_NAME:-lacrei_db}
      DB_USER: ${DB_USER:-lacrei_user}
      DB_PASSWORD: ${DB_PASSWORD:-lacrei_pass}
      DB_HOST: db
      DB_PORT: "5432"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      VALID_API_KEYS: "dev-api-key-change-in-prod"
    volumes:
      - .:/app
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  # ── pgAdmin (opcional — acesso visual ao banco) ───────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lacrei_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lacrei.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - tools  # Sobe só com: docker compose --profile tools up

volumes:
  postgres_data:
    name: lacrei_postgres_data
